<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Download Organizer</title>
<style>
  :root{
    --bg:#0c0c10; --surface:#16161d; --surface-2:#1d1d26;
    --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.12);
    --text:#ECECF1; --muted:#8b8b9a; --faint:#5b5b68;
    --accent:#7c5cff; --accent-soft:rgba(124,92,255,.14);
    --gold:#ffd23f; --green:#36d399; --red:#f87272;
    --r:16px; --r-sm:11px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 600px at 100% -10%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,210,63,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:28px 30px 36px;
    min-height:100%;
  }
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:9px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

  /* header */
  header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .logo{
    width:42px;height:42px;border-radius:12px;flex:none;
    background:linear-gradient(150deg,#8a6bff,#6a47ff);
    display:grid;place-items:center;font-size:22px;
    box-shadow:0 6px 20px rgba(124,92,255,.35);
  }
  .title h1{font-size:17px;font-weight:650;letter-spacing:-.01em}
  .title p{font-size:12px;color:var(--muted)}
  .spacer{flex:1}
  .pill{
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:550;
    background:var(--surface);border:1px solid var(--border);cursor:pointer;
    transition:.16s;user-select:none;
  }
  .pill:hover{border-color:var(--border-strong);background:var(--surface-2)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .pill.live .dot{background:var(--green);box-shadow:0 0 0 4px rgba(54,211,153,.16)}
  .pill.paused .dot{background:var(--gold)}

  /* stat strip */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .stat{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    padding:16px 18px;
  }
  .stat .n{font-size:26px;font-weight:680;letter-spacing:-.02em}
  .stat .l{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
  .stat .n.warn{color:var(--gold)}

  /* action bar */
  .actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .btn{
    appearance:none;border:1px solid var(--border);background:var(--surface);
    color:var(--text);font:inherit;font-weight:560;font-size:13px;
    padding:10px 16px;border-radius:var(--r-sm);cursor:pointer;transition:.16s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(124,92,255,.30)}
  .btn.primary:hover{background:#8b6bff}

  /* layout */
  .grid{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;align-items:start}
  @media (max-width:760px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .card h2{
    font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;padding:15px 18px 11px;display:flex;align-items:center;gap:8px;
  }
  .card h2 .count{
    margin-left:auto;background:var(--surface-2);color:var(--muted);
    font-size:11px;padding:2px 8px;border-radius:999px;letter-spacing:0;text-transform:none;
  }

  /* recent list */
  .row{
    display:flex;align-items:center;gap:12px;padding:11px 18px;
    border-top:1px solid var(--border);transition:background .14s;
  }
  .row:hover{background:rgba(255,255,255,.025)}
  .ico{
    width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;
    font-size:17px;background:var(--surface-2);border:1px solid var(--border);
  }
  .row .meta{min-width:0;flex:1}
  .row .name{font-size:13px;font-weight:520;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sub{font-size:11.5px;color:var(--muted);display:flex;gap:7px;align-items:center;margin-top:1px}
  .tag{color:var(--accent);font-weight:560}
  .row .when{font-size:11px;color:var(--faint);flex:none}
  .reveal{
    flex:none;border:1px solid var(--border);background:transparent;color:var(--muted);
    width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:13px;transition:.14s;
    display:grid;place-items:center;opacity:0;
  }
  .row:hover .reveal{opacity:1}
  .reveal:hover{color:var(--text);border-color:var(--border-strong);background:var(--surface-2)}

  /* category cards */
  .cats{padding:8px}
  .cat{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;
    cursor:pointer;transition:background .14s;
  }
  .cat:hover{background:rgba(255,255,255,.03)}
  .cat .ico{width:30px;height:30px;font-size:15px}
  .cat .cname{flex:1;font-size:13px;font-weight:520}
  .cat .cn{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .cat .go{color:var(--faint);font-size:12px;opacity:0;transition:.14s}
  .cat:hover .go{opacity:1;color:var(--muted)}

  .empty{padding:34px 18px;text-align:center;color:var(--faint);font-size:13px;border-top:1px solid var(--border)}
  .empty .big{font-size:30px;margin-bottom:8px;opacity:.6}
  footer{margin-top:22px;color:var(--faint);font-size:11px;text-align:center}
  .flash{transition:background .5s} .flash.hit{background:var(--accent-soft)}
</style>
</head>
<body>
  <header>
    <div class="logo">📥</div>
    <div class="title">
      <h1>Download Organizer</h1>
      <p id="path">~/Downloads</p>
    </div>
    <div class="spacer"></div>
    <div id="statusPill" class="pill" onclick="toggleWatch()">
      <span class="dot"></span><span id="statusText">…</span>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="n" id="sToday">0</div><div class="l">Sorted today</div></div>
    <div class="stat"><div class="n" id="sTotal">0</div><div class="l">Sorted all-time</div></div>
    <div class="stat"><div class="n" id="sPending">0</div><div class="l">Waiting at top level</div></div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="organize()">✨ Organize Now</button>
    <button class="btn" onclick="restart()">🔄 Restart Service</button>
    <button class="btn" onclick="openPath(PATHS.downloads)">📂 Open Downloads</button>
    <button class="btn" onclick="openExt(PATHS.config)">⚙︎ Edit Categories</button>
    <button class="btn" onclick="openExt(PATHS.log)">🧾 Activity Log</button>
  </div>

  <div class="grid">
    <div class="card" id="recentCard">
      <h2>Recent activity <span class="count" id="recentCount">0</span></h2>
      <div id="recent"></div>
    </div>
    <div class="card">
      <h2>Folders</h2>
      <div class="cats" id="cats"></div>
    </div>
  </div>

  <footer id="foot">Watching for new downloads…</footer>

<script>
const PATHS = {downloads:"", config:"", log:""};
const ICON = {
  "3D-Models":"🧊","Media":"🖼️","Documents":"📄","Software":"🧩",
  "Archives":"🗜️","Fonts":"🔤","Dev":"💻","_Unsorted":"❓","_Sensitive":"🔒","NFT":"🎴"
};
const ic = c => ICON[c] || "📁";

async function api(path, opts){ const r = await fetch(path, opts); return r.json(); }
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function relTime(iso){
  const d = new Date(iso), now = new Date(), s = Math.floor((now-d)/1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60)+"m ago";
  if (s < 86400 && d.getDate()===now.getDate()) return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString([], {month:"short",day:"numeric"});
}

let lastTop = null;
function render(st){
  PATHS.downloads = st.downloads_dir; PATHS.config = st.config_path; PATHS.log = st.log_path;
  document.getElementById("path").textContent = st.downloads_pretty;

  const pill = document.getElementById("statusPill");
  pill.className = "pill " + (st.watching ? "live":"paused");
  document.getElementById("statusText").textContent = st.watching ? "Watching" : "Paused";

  document.getElementById("sToday").textContent = st.sorted_today;
  document.getElementById("sTotal").textContent = st.sorted_total;
  const pend = document.getElementById("sPending");
  pend.textContent = st.pending; pend.className = "n" + (st.pending>0 ? " warn":"");

  // recent
  document.getElementById("recentCount").textContent = st.recent.length;
  const box = document.getElementById("recent");
  if (!st.recent.length){
    box.innerHTML = '<div class="empty"><div class="big">🗂️</div>Nothing sorted yet.<br>New downloads will appear here automatically.</div>';
  } else {
    box.innerHTML = st.recent.map(r => `
      <div class="row" data-k="${esc(r.dest)}">
        <div class="ico">${ic(r.cat)}</div>
        <div class="meta">
          <div class="name">${esc(r.name)}</div>
          <div class="sub"><span class="tag">${esc(r.cat)}</span><span>·</span><span>${esc(r.cat)}/</span></div>
        </div>
        <div class="when">${relTime(r.ts)}</div>
        <button class="reveal" title="Reveal in Finder" onclick='reveal(${JSON.stringify(r.dest)})'>⤢</button>
      </div>`).join("");
    const top = st.recent[0].dest;
    if (lastTop && top !== lastTop){
      const el = box.querySelector(".row");
      if (el){ el.classList.add("flash"); requestAnimationFrame(()=>el.classList.add("hit")); setTimeout(()=>el.classList.remove("hit"),700); }
    }
    lastTop = top;
  }

  // folders
  const cats = document.getElementById("cats");
  cats.innerHTML = st.folders.map(f => `
    <div class="cat" onclick='openPath(${JSON.stringify(f.path)})'>
      <div class="ico">${ic(f.name)}</div>
      <div class="cname">${esc(f.name)}</div>
      <div class="cn">${f.count}</div>
      <div class="go">↗</div>
    </div>`).join("") || '<div class="empty" style="border:none">No category folders yet</div>';
}

async function refresh(){ try{ render(await api("/api/state")); }catch(e){ document.getElementById("foot").textContent = "Disconnected from organizer."; } }
async function organize(){ const r = await api("/api/organize",{method:"POST"}); flashFoot(r.moved ? `Organized ${r.moved} file${r.moved>1?"s":""}` : "Top level already clean"); refresh(); }
async function toggleWatch(){ await api("/api/toggle",{method:"POST"}); refresh(); }
async function restart(){ flashFoot("Restarting service…"); await api("/api/restart",{method:"POST"}); setTimeout(()=>{flashFoot("Service restarted · config reloaded"); refresh();}, 600); }
async function reveal(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p,reveal:true})}); }
async function openPath(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p})}); }
async function openExt(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p,text:true})}); }

let footT;
function flashFoot(msg){ const f=document.getElementById("foot"); f.textContent=msg; clearTimeout(footT); footT=setTimeout(()=>f.textContent="Watching for new downloads…",2600); }

refresh(); setInterval(refresh, 2000);
</script>
</body>
</html>
