<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Download Organizer</title>
<style>
  :root{
    --bg:#0c0c10; --surface:#16161d; --surface-2:#1d1d26;
    --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.12);
    --text:#ECECF1; --muted:#8b8b9a; --faint:#5b5b68;
    --accent:#7c5cff; --accent-soft:rgba(124,92,255,.14);
    --gold:#ffd23f; --green:#36d399; --red:#f87272;
    --r:16px; --r-sm:11px;
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 600px at 100% -10%, rgba(124,92,255,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(255,210,63,.06), transparent 55%),
      var(--bg);
    color:var(--text);
    font:14px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","Inter",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    padding:28px 30px 36px;
    min-height:100%;
  }
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.10);border-radius:9px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}

  /* header */
  header{display:flex;align-items:center;gap:14px;margin-bottom:24px}
  .logo{
    width:42px;height:42px;border-radius:12px;flex:none;
    background:linear-gradient(150deg,#8a6bff,#6a47ff);
    display:grid;place-items:center;font-size:22px;
    box-shadow:0 6px 20px rgba(124,92,255,.35);
  }
  .title h1{font-size:17px;font-weight:650;letter-spacing:-.01em}
  .title p{font-size:12px;color:var(--muted)}
  .spacer{flex:1}
  .pill{
    display:inline-flex;align-items:center;gap:7px;
    padding:7px 13px;border-radius:999px;font-size:12.5px;font-weight:550;
    background:var(--surface);border:1px solid var(--border);cursor:pointer;
    transition:.16s;user-select:none;
  }
  .pill:hover{border-color:var(--border-strong);background:var(--surface-2)}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--faint)}
  .pill.live .dot{background:var(--green);box-shadow:0 0 0 4px rgba(54,211,153,.16)}
  .pill.paused .dot{background:var(--gold)}

  /* stat strip */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px}
  .stat{
    background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
    padding:16px 18px;
  }
  .stat .n{font-size:26px;font-weight:680;letter-spacing:-.02em}
  .stat .l{font-size:11.5px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.04em}
  .stat .n.warn{color:var(--gold)}

  /* action bar */
  .actions{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
  .btn{
    appearance:none;border:1px solid var(--border);background:var(--surface);
    color:var(--text);font:inherit;font-weight:560;font-size:13px;
    padding:10px 16px;border-radius:var(--r-sm);cursor:pointer;transition:.16s;
    display:inline-flex;align-items:center;gap:8px;
  }
  .btn:hover{background:var(--surface-2);border-color:var(--border-strong)}
  .btn:active{transform:translateY(1px)}
  .btn.primary{background:var(--accent);border-color:transparent;color:#fff;box-shadow:0 6px 18px rgba(124,92,255,.30)}
  .btn.primary:hover{background:#8b6bff}

  /* layout */
  .grid{display:grid;grid-template-columns:1.45fr 1fr;gap:18px;align-items:start}
  @media (max-width:760px){.grid{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
  .card h2{
    font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;
    letter-spacing:.05em;padding:15px 18px 11px;display:flex;align-items:center;gap:8px;
  }
  .card h2 .count{
    margin-left:auto;background:var(--surface-2);color:var(--muted);
    font-size:11px;padding:2px 8px;border-radius:999px;letter-spacing:0;text-transform:none;
  }

  /* recent list */
  .row{
    display:flex;align-items:center;gap:12px;padding:11px 18px;
    border-top:1px solid var(--border);transition:background .14s;
  }
  .row:hover{background:rgba(255,255,255,.025)}
  .ico{
    width:34px;height:34px;border-radius:10px;flex:none;display:grid;place-items:center;
    font-size:17px;background:var(--surface-2);border:1px solid var(--border);
  }
  .row .meta{min-width:0;flex:1}
  .row .name{font-size:13px;font-weight:520;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .row .sub{font-size:11.5px;color:var(--muted);display:flex;gap:7px;align-items:center;margin-top:1px}
  .tag{color:var(--accent);font-weight:560}
  .row .when{font-size:11px;color:var(--faint);flex:none}
  .reveal{
    flex:none;border:1px solid var(--border);background:transparent;color:var(--muted);
    width:30px;height:30px;border-radius:9px;cursor:pointer;font-size:13px;transition:.14s;
    display:grid;place-items:center;opacity:0;
  }
  .row:hover .reveal{opacity:1}
  .reveal:hover{color:var(--text);border-color:var(--border-strong);background:var(--surface-2)}

  /* category cards */
  .cats{padding:8px}
  .cat{
    display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:11px;
    cursor:pointer;transition:background .14s;
  }
  .cat:hover{background:rgba(255,255,255,.03)}
  .cat .ico{width:30px;height:30px;font-size:15px}
  .cat .cname{flex:1;font-size:13px;font-weight:520}
  .cat .cn{font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums}
  .cat .go{color:var(--faint);font-size:12px;opacity:0;transition:.14s}
  .cat:hover .go{opacity:1;color:var(--muted)}

  .empty{padding:34px 18px;text-align:center;color:var(--faint);font-size:13px;border-top:1px solid var(--border)}
  .empty .big{font-size:30px;margin-bottom:8px;opacity:.6}
  footer{margin-top:22px;color:var(--faint);font-size:11px;text-align:center}
  .flash{transition:background .5s} .flash.hit{background:var(--accent-soft)}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn:disabled:hover{background:var(--surface);border-color:var(--border)}

  /* ---- Decider overlay ---- */
  #decider{
    position:fixed;inset:0;z-index:50;display:none;flex-direction:column;
    background:rgba(8,8,12,.86);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  }
  #decider.open{display:flex}
  .dx-top{display:flex;align-items:center;gap:12px;padding:16px 20px}
  .dx-top h2{font-size:15px;font-weight:650}
  .dx-top .spacer{flex:1}
  .dx-sel{
    background:var(--surface);color:var(--text);border:1px solid var(--border-strong);
    border-radius:10px;padding:8px 11px;font:inherit;font-size:13px;cursor:pointer;
  }
  .dx-close{
    border:1px solid var(--border);background:var(--surface);color:var(--muted);
    width:34px;height:34px;border-radius:10px;cursor:pointer;font-size:16px;
  }
  .dx-close:hover{color:var(--text);border-color:var(--border-strong)}
  .dx-pills{display:flex;gap:9px;justify-content:center;flex-wrap:wrap;padding:0 16px 6px}
  .dx-pill{background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:6px 13px;font-size:12px;color:var(--muted)}
  .dx-pill b{color:var(--text);font-variant-numeric:tabular-nums}
  .dx-pill.keep b{color:var(--green)} .dx-pill.trash b{color:var(--red)}
  #dxStage{position:relative;flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .dx-card{
    position:absolute;width:min(86vw,400px);height:min(54vh,480px);
    background:var(--surface);border:1px solid var(--border-strong);border-radius:22px;
    box-shadow:0 22px 60px rgba(0,0,0,.55);padding:24px;
    display:flex;flex-direction:column;justify-content:space-between;
    will-change:transform;touch-action:none;user-select:none;
  }
  .dx-card .cat{font-size:11.5px;color:var(--accent);font-weight:650;text-transform:uppercase;letter-spacing:.6px}
  .dx-card .ico{font-size:66px;text-align:center;margin:6px 0}
  .dx-card .nm{font-size:17px;font-weight:600;word-break:break-word;max-height:7.2em;overflow:hidden;text-align:center}
  .dx-card .sz{text-align:center;font-size:30px;font-weight:800;letter-spacing:-.02em;margin-top:auto}
  .dx-card .szlbl{text-align:center;color:var(--muted);font-size:12px}
  .stamp{position:absolute;top:24px;font-size:26px;font-weight:900;padding:5px 12px;border-radius:11px;border:4px solid;opacity:0;transform:rotate(-13deg)}
  .stamp.k{left:20px;color:var(--green);border-color:var(--green)}
  .stamp.t{right:20px;color:var(--red);border-color:var(--red)}
  .dx-btns{display:flex;gap:22px;justify-content:center;padding:16px 0 26px}
  .dx-rb{width:60px;height:60px;border-radius:50%;border:none;font-size:25px;cursor:pointer;color:#fff;box-shadow:0 6px 18px rgba(0,0,0,.45)}
  .dx-rb.t{background:var(--red)} .dx-rb.k{background:var(--green)}
  .dx-rb.u{background:var(--surface-2);color:var(--muted);width:48px;height:48px;font-size:19px;align-self:center;border:1px solid var(--border)}
  .dx-done{text-align:center;max-width:440px;padding:30px}
  .dx-done h3{font-size:22px;margin-bottom:6px}
  .dx-done .lead{color:var(--muted);font-size:14px;margin-bottom:18px}
  .dx-done .big{font-size:34px;font-weight:800;color:var(--red);letter-spacing:-.02em}
  .dx-done .biglbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.05em;margin-bottom:18px}
  .dx-list{max-height:34vh;overflow:auto;text-align:left;margin:0 auto 18px;max-width:440px}
  .dx-list .li{display:flex;gap:10px;padding:7px 10px;border-top:1px solid var(--border);font-size:13px}
  .dx-list .li .nm2{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .dx-list .li .s2{color:var(--muted);font-variant-numeric:tabular-nums}
  .dx-empty{color:var(--faint);text-align:center;font-size:14px;padding:40px}

  /* update banner */
  #updateBar{
    display:none;align-items:center;gap:11px;margin-bottom:16px;
    padding:11px 14px;border-radius:var(--r-sm);
    background:linear-gradient(120deg,rgba(124,92,255,.18),rgba(124,92,255,.06));
    border:1px solid rgba(124,92,255,.35);font-size:13px;
  }
  #updateBar .ub-ico{font-size:15px}
  #updateBar .ub-spacer{flex:1}
  #updateBar .ub-btn{
    border:none;background:var(--accent);color:#fff;font:inherit;font-weight:600;font-size:12.5px;
    padding:7px 14px;border-radius:9px;cursor:pointer;
  }
  #updateBar .ub-btn:hover{background:#8b6bff}
  #updateBar .ub-x{
    border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;
    width:26px;height:26px;border-radius:7px;
  }
  #updateBar .ub-x:hover{color:var(--text);background:rgba(255,255,255,.06)}

  /* search */
  .search{position:relative;width:min(320px,42vw)}
  .search input{
    width:100%;background:var(--surface);border:1px solid var(--border);
    color:var(--text);font:inherit;font-size:13px;padding:9px 13px;border-radius:999px;outline:none;
  }
  .search input:focus{border-color:var(--border-strong);background:var(--surface-2)}
  .search input::placeholder{color:var(--faint)}
  #searchResults{
    position:absolute;top:calc(100% + 8px);right:0;width:min(460px,86vw);max-height:60vh;overflow:auto;
    background:var(--surface);border:1px solid var(--border-strong);border-radius:14px;
    box-shadow:0 18px 50px rgba(0,0,0,.5);z-index:40;display:none;padding:6px;
  }
  #searchResults.open{display:block}
  .sr{display:flex;align-items:center;gap:11px;padding:9px 11px;border-radius:10px;cursor:pointer}
  .sr:hover{background:rgba(255,255,255,.04)}
  .sr .meta{min-width:0;flex:1}
  .sr .name{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sr .sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sr .s{font-size:11.5px;color:var(--muted);flex:none;font-variant-numeric:tabular-nums}
  .sr-empty{padding:18px;text-align:center;color:var(--faint);font-size:12.5px}

  /* mode segmented control */
  .seg{display:inline-flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden}
  .seg button{
    appearance:none;border:none;background:transparent;color:var(--muted);
    font:inherit;font-weight:560;font-size:12.5px;padding:9px 14px;cursor:pointer;transition:.14s;
  }
  .seg button:hover{color:var(--text)}
  .seg button.on{background:var(--accent);color:#fff}
  .seg .seg-lbl{padding:9px 4px 9px 12px;color:var(--faint);font-size:11.5px;align-self:center;cursor:default}

  /* pending decisions */
  #pendingCard{margin-bottom:14px}
  #pendingCard h2 .mini-btn{
    margin-left:auto;border:1px solid var(--border-strong);background:var(--accent);color:#fff;
    font:inherit;font-weight:560;font-size:11px;padding:4px 11px;border-radius:8px;cursor:pointer;
    letter-spacing:0;text-transform:none;
  }
  #pendingCard h2 .mini-btn:hover{background:#8b6bff}
  .prow{display:flex;align-items:center;gap:12px;padding:10px 18px;border-top:1px solid var(--border)}
  .prow .meta{min-width:0;flex:1}
  .prow .name{font-size:13px;font-weight:520;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .prow .sub{font-size:11.5px;color:var(--muted);margin-top:1px}
  .prow .sug{color:var(--accent);font-weight:560}
  .prow .acts{display:flex;gap:7px;flex:none}
  .pbtn{border:1px solid var(--border);background:var(--surface-2);color:var(--text);
    font:inherit;font-size:12px;font-weight:540;padding:6px 12px;border-radius:8px;cursor:pointer;transition:.14s}
  .pbtn:hover{border-color:var(--border-strong)}
  .pbtn.sort{background:var(--accent);border-color:transparent;color:#fff}
  .pbtn.sort:hover{background:#8b6bff}
</style>
</head>
<body>
  <header>
    <div class="logo">📥</div>
    <div class="title">
      <h1>Download Organizer</h1>
      <p id="path">~/Downloads</p>
    </div>
    <div class="spacer"></div>
    <div class="search">
      <input id="searchInput" type="search" placeholder="Search all of Downloads…"
             oninput="onSearch(this.value)" onfocus="if(this.value)onSearch(this.value)" autocomplete="off" />
      <div id="searchResults"></div>
    </div>
    <div id="statusPill" class="pill" onclick="toggleWatch()">
      <span class="dot"></span><span id="statusText">…</span>
    </div>
  </header>

  <div id="updateBar">
    <span class="ub-ico">⬆︎</span>
    <span id="updateText">Update available</span>
    <span class="ub-spacer"></span>
    <button class="ub-btn" onclick="getUpdate()">Download</button>
    <button class="ub-x" onclick="document.getElementById('updateBar').style.display='none'" title="Dismiss">✕</button>
  </div>

  <div class="stats">
    <div class="stat"><div class="n" id="sToday">0</div><div class="l">Sorted today</div></div>
    <div class="stat"><div class="n" id="sTotal">0</div><div class="l">Sorted all-time</div></div>
    <div class="stat"><div class="n" id="sPending">0</div><div class="l">Waiting at top level</div></div>
  </div>

  <div class="actions">
    <button class="btn primary" onclick="organize()">✨ Organize Now</button>
    <button class="btn" id="deciderBtn" onclick="openDecider()" disabled title="Organize first to unlock">🔥 Decider</button>
    <button class="btn" onclick="restart()">🔄 Restart Service</button>
    <button class="btn" onclick="checkNow()">⬆︎ Check Updates</button>
    <button class="btn" onclick="openPath(PATHS.downloads)">📂 Open Downloads</button>
    <button class="btn" onclick="openExt(PATHS.config)">⚙︎ Edit Categories</button>
    <button class="btn" onclick="openExt(PATHS.log)">🧾 Activity Log</button>
    <div class="seg" id="modeSeg">
      <span class="seg-lbl">New files:</span>
      <button data-mode="auto" onclick="setMode('auto')">Auto-sort</button>
      <button data-mode="ask" onclick="setMode('ask')">Ask first</button>
    </div>
  </div>

  <div class="card" id="pendingCard" style="display:none">
    <h2>⏳ Waiting for you — sort or keep? <span class="count" id="pendCount">0</span>
      <button class="mini-btn" onclick="sortAll()">Sort all</button>
    </h2>
    <div id="pending"></div>
  </div>

  <div class="grid">
    <div class="card" id="recentCard">
      <h2>Recent activity <span class="count" id="recentCount">0</span></h2>
      <div id="recent"></div>
    </div>
    <div class="card">
      <h2>Folders</h2>
      <div class="cats" id="cats"></div>
    </div>
  </div>

  <footer id="foot">Watching for new downloads…</footer>

  <!-- Decider overlay -->
  <div id="decider">
    <div class="dx-top">
      <h2>🔥 Decider</h2>
      <select id="dxSel" class="dx-sel" onchange="dxLoad(this.value)"></select>
      <div class="spacer"></div>
      <button class="dx-close" onclick="closeDecider()" title="Close">✕</button>
    </div>
    <div class="dx-pills">
      <span class="dx-pill">Left <b id="dxLeft">0</b></span>
      <span class="dx-pill keep">Keep <b id="dxKeep">0</b></span>
      <span class="dx-pill trash">Trash <b id="dxTrash">0</b> · <b id="dxReclaim">0 B</b></span>
    </div>
    <div id="dxStage"></div>
    <div class="dx-btns" id="dxBtns" style="display:none">
      <button class="dx-rb t" onclick="dxDecide('trash')" title="Trash (←)">🗑️</button>
      <button class="dx-rb u" onclick="dxUndo()" title="Undo (↓)">↩︎</button>
      <button class="dx-rb k" onclick="dxDecide('keep')" title="Keep (→)">💚</button>
    </div>
  </div>

<script>
const PATHS = {downloads:"", config:"", log:""};
let FOLDERS = [];
const ICON = {
  "3D-Models":"🧊","Media":"🖼️","Documents":"📄","Software":"🧩",
  "Archives":"🗜️","Fonts":"🔤","Dev":"💻","_Unsorted":"❓","_Sensitive":"🔒","NFT":"🎴"
};
const ic = c => ICON[c] || "📁";

async function api(path, opts){ const r = await fetch(path, opts); return r.json(); }
function esc(s){ return (s||"").replace(/[&<>"]/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

function relTime(iso){
  const d = new Date(iso), now = new Date(), s = Math.floor((now-d)/1000);
  if (s < 60) return "just now";
  if (s < 3600) return Math.floor(s/60)+"m ago";
  if (s < 86400 && d.getDate()===now.getDate()) return d.toLocaleTimeString([], {hour:"2-digit",minute:"2-digit"});
  return d.toLocaleDateString([], {month:"short",day:"numeric"});
}

let lastTop = null;
function render(st){
  PATHS.downloads = st.downloads_dir; PATHS.config = st.config_path; PATHS.log = st.log_path;
  document.getElementById("path").textContent = st.downloads_pretty;

  const pill = document.getElementById("statusPill");
  pill.className = "pill " + (st.watching ? "live":"paused");
  document.getElementById("statusText").textContent = st.watching ? "Watching" : "Paused";

  const db = document.getElementById("deciderBtn");
  db.disabled = !st.decider_unlocked;
  db.title = st.decider_unlocked ? "Swipe-sort your folders" : "Organize first to unlock";

  renderMode(st.sort_mode || "auto");
  renderPending(st.pending_list || []);

  document.getElementById("sToday").textContent = st.sorted_today;
  document.getElementById("sTotal").textContent = st.sorted_total;
  const pend = document.getElementById("sPending");
  pend.textContent = st.pending; pend.className = "n" + (st.pending>0 ? " warn":"");

  // recent
  document.getElementById("recentCount").textContent = st.recent.length;
  const box = document.getElementById("recent");
  if (!st.recent.length){
    box.innerHTML = '<div class="empty"><div class="big">🗂️</div>Nothing sorted yet.<br>New downloads will appear here automatically.</div>';
  } else {
    box.innerHTML = st.recent.map(r => `
      <div class="row" data-k="${esc(r.dest)}">
        <div class="ico">${ic(r.cat)}</div>
        <div class="meta">
          <div class="name">${esc(r.name)}</div>
          <div class="sub"><span class="tag">${esc(r.cat)}</span><span>·</span><span>${esc(r.cat)}/</span></div>
        </div>
        <div class="when">${relTime(r.ts)}</div>
        <button class="reveal" title="Reveal in Finder" onclick='reveal(${JSON.stringify(r.dest)})'>⤢</button>
      </div>`).join("");
    const top = st.recent[0].dest;
    if (lastTop && top !== lastTop){
      const el = box.querySelector(".row");
      if (el){ el.classList.add("flash"); requestAnimationFrame(()=>el.classList.add("hit")); setTimeout(()=>el.classList.remove("hit"),700); }
    }
    lastTop = top;
  }

  FOLDERS = st.folders || [];
  // folders
  const cats = document.getElementById("cats");
  cats.innerHTML = st.folders.map(f => `
    <div class="cat" onclick='openPath(${JSON.stringify(f.path)})'>
      <div class="ico">${ic(f.name)}</div>
      <div class="cname">${esc(f.name)}</div>
      <div class="cn">${f.count}</div>
      <div class="go">↗</div>
    </div>`).join("") || '<div class="empty" style="border:none">No category folders yet</div>';
}

async function refresh(){ try{ render(await api("/api/state")); }catch(e){ document.getElementById("foot").textContent = "Disconnected from organizer."; } }
async function organize(){ const r = await api("/api/organize",{method:"POST"}); flashFoot(r.moved ? `Organized ${r.moved} file${r.moved>1?"s":""}` : "Top level already clean"); refresh(); }
async function toggleWatch(){ await api("/api/toggle",{method:"POST"}); refresh(); }
async function restart(){ flashFoot("Restarting service…"); await api("/api/restart",{method:"POST"}); setTimeout(()=>{flashFoot("Service restarted · config reloaded"); refresh();}, 600); }
async function reveal(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p,reveal:true})}); }
async function openPath(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p})}); }
async function openExt(p){ await api("/api/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path:p,text:true})}); }

let footT;
function flashFoot(msg){ const f=document.getElementById("foot"); f.textContent=msg; clearTimeout(footT); footT=setTimeout(()=>f.textContent="Watching for new downloads…",2600); }

/* ---------------- Decider ---------------- */
let dxAll = [], dxQueue = [], dxCur = null, dxDec = {}, dxHist = [];
function fmt(b){
  if(b<1024) return b+" B";
  const u=["KB","MB","GB","TB"]; let i=-1;
  do{ b/=1024; i++; }while(b>=1024 && i<u.length-1);
  return b.toFixed(b<10?1:0)+" "+u[i];
}
function dxIcon(c){
  if(c.dir) return "📁";
  const e=(c.name.split(".").pop()||"").toLowerCase();
  if(["png","jpg","jpeg","gif","webp","heic","svg","bmp","tiff"].includes(e)) return "🖼️";
  if(["mp4","mov","mkv","avi","webm","m4v"].includes(e)) return "🎬";
  if(["mp3","wav","flac","aac","m4a","ogg"].includes(e)) return "🎵";
  if(["pdf","doc","docx","txt","md","pages","rtf"].includes(e)) return "📄";
  if(["zip","rar","7z","tar","gz","dmg","pkg"].includes(e)) return "🗜️";
  if(["stl","obj","3mf","fbx","gltf","glb","blend"].includes(e)) return "🧊";
  if(["app","exe","msi","deb"].includes(e)) return "🧩";
  return "📦";
}
function openDecider(){
  const sel = document.getElementById("dxSel");
  const opts = FOLDERS.filter(f=>f.count>0);
  sel.innerHTML = opts.length
    ? opts.map(f=>`<option value="${esc(f.name)}">${esc(f.name)} · ${f.count}</option>`).join("")
    : '<option value="">No non-empty folders</option>';
  document.getElementById("decider").classList.add("open");
  if(opts.length) dxLoad(opts[0].name); else dxRender();
}
function closeDecider(){ document.getElementById("decider").classList.remove("open"); }
async function dxLoad(cat){
  dxDec = {}; dxHist = [];
  if(!cat){ dxAll=[]; dxQueue=[]; dxRender(); return; }
  dxAll = await api("/api/decider/list?cat="+encodeURIComponent(cat));
  dxQueue = dxAll.slice();
  dxRender();
}
function dxStats(){
  const trash = dxAll.filter(c=>dxDec[c.path]==="trash");
  const keep = dxAll.filter(c=>dxDec[c.path]==="keep");
  const rec = trash.reduce((s,c)=>s+c.size,0);
  document.getElementById("dxLeft").textContent = dxQueue.length;
  document.getElementById("dxKeep").textContent = keep.length;
  document.getElementById("dxTrash").textContent = trash.length;
  document.getElementById("dxReclaim").textContent = fmt(rec);
  return {trash, keep, rec};
}
function dxRender(){
  const stage = document.getElementById("dxStage");
  const btns = document.getElementById("dxBtns");
  stage.innerHTML = "";
  if(!dxAll.length){ btns.style.display="none"; stage.innerHTML='<div class="dx-empty">Nothing here to sort. Pick another folder.</div>'; dxStats(); return; }
  if(!dxQueue.length){ btns.style.display="none"; dxDone(stage); dxStats(); return; }
  btns.style.display="flex";
  for(let i=Math.min(dxQueue.length-1,1); i>=0; i--){
    const c=dxQueue[i], el=document.createElement("div");
    el.className="dx-card";
    el.style.transform = i===0 ? "" : "scale(.95) translateY(14px)";
    el.style.zIndex = 10-i;
    el.innerHTML = `<div class="cat">${esc(c.cat)}</div>
      <div class="stamp k">KEEP</div><div class="stamp t">TRASH</div>
      <div class="ico">${dxIcon(c)}</div>
      <div class="nm">${esc(c.name)}</div>
      <div class="sz">${fmt(c.size)}</div><div class="szlbl">${c.dir?"folder":"file"}</div>`;
    if(i===0){ dxCur=c; dxDrag(el); }
    stage.appendChild(el);
  }
  dxStats();
}
function dxDecide(v){
  if(!dxCur) return;
  dxDec[dxCur.path]=v; dxHist.push(dxCur.path);
  dxQueue.shift(); dxRender();
}
function dxUndo(){
  const p=dxHist.pop(); if(!p) return;
  delete dxDec[p];
  const item=dxAll.find(c=>c.path===p);
  if(item) dxQueue.unshift(item);
  dxRender();
}
function dxDrag(el){
  let sx=0,dx=0,dy=0,down=false;
  const k=el.querySelector(".stamp.k"), t=el.querySelector(".stamp.t");
  const start=e=>{down=true;const p=e.touches?e.touches[0]:e;sx=p.clientX;el.style.transition="none";};
  const move=e=>{if(!down)return;const p=e.touches?e.touches[0]:e;dx=p.clientX-sx;
    el.style.transform=`translate(${dx}px,${dy}px) rotate(${dx/18}deg)`;
    k.style.opacity=Math.max(0,dx/120);t.style.opacity=Math.max(0,-dx/120);};
  const end=()=>{if(!down)return;down=false;el.style.transition="transform .3s ease,opacity .3s";
    if(dx>110){el.style.transform=`translate(${innerWidth}px,0) rotate(20deg)`;el.style.opacity=0;setTimeout(()=>dxDecide("keep"),170);}
    else if(dx<-110){el.style.transform=`translate(${-innerWidth}px,0) rotate(-20deg)`;el.style.opacity=0;setTimeout(()=>dxDecide("trash"),170);}
    else{el.style.transform="";k.style.opacity=0;t.style.opacity=0;}dx=0;};
  el.addEventListener("mousedown",start);el.addEventListener("touchstart",start,{passive:true});
  el.addEventListener("touchmove",move,{passive:true});el.addEventListener("touchend",end);
  el._mv=move; el._end=end;
  addEventListener("mousemove",move);addEventListener("mouseup",end);
}
function dxDone(stage){
  const {trash, rec} = dxStats();
  if(!trash.length){
    stage.innerHTML=`<div class="dx-done"><div class="big" style="color:var(--green)">✓ All clear</div>
      <div class="biglbl">nothing marked for trash</div>
      <button class="btn" onclick="dxLoad(document.getElementById('dxSel').value)">↻ Review again</button></div>`;
    return;
  }
  const list = trash.slice().sort((a,b)=>b.size-a.size);
  stage.innerHTML=`<div class="dx-done">
    <h3>Ready to clean up</h3>
    <div class="lead">${trash.length} item${trash.length>1?"s":""} marked — they'll go to the Trash (recoverable).</div>
    <div class="big" id="dxFreed">${fmt(rec)}</div>
    <div class="biglbl">space to reclaim</div>
    <div class="dx-list">${list.map(c=>`<div class="li"><span>${dxIcon(c)}</span><span class="nm2">${esc(c.name)}</span><span class="s2">${fmt(c.size)}</span></div>`).join("")}</div>
    <button class="btn primary" id="dxCommit" onclick="dxCommit()">🗑️ Move ${trash.length} to Trash · ${fmt(rec)}</button>
    <button class="btn" onclick="dxLoad(document.getElementById('dxSel').value)" style="margin-left:8px">↻ Start over</button>
  </div>`;
}
async function dxCommit(){
  const trash = dxAll.filter(c=>dxDec[c.path]==="trash");
  const btn=document.getElementById("dxCommit");
  if(btn){ btn.disabled=true; btn.textContent="Moving to Trash…"; }
  const res = await api("/api/decider/trash",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({paths:trash.map(c=>c.path)})});
  const stage=document.getElementById("dxStage");
  stage.innerHTML=`<div class="dx-done">
    <div class="big" style="color:var(--green)">♻︎ ${fmt(res.freed||0)}</div>
    <div class="biglbl">reclaimed · ${res.trashed} item${res.trashed===1?"":"s"} trashed</div>
    ${res.errors&&res.errors.length?`<div class="lead" style="color:var(--gold)">${res.errors.length} couldn't be moved</div>`:""}
    <button class="btn primary" onclick="dxNext()">Next folder →</button>
    <button class="btn" onclick="closeDecider()" style="margin-left:8px">Done</button>
  </div>`;
  document.getElementById("dxBtns").style.display="none";
  flashFoot(`Reclaimed ${fmt(res.freed||0)} · ${res.trashed} to Trash`);
  refresh();
}
function dxNext(){
  const sel=document.getElementById("dxSel");
  const opts=[...sel.options].filter(o=>o.value);
  if(!opts.length){ closeDecider(); return; }
  const i=opts.findIndex(o=>o.value===sel.value);
  const nxt=opts[(i+1)%opts.length];
  sel.value=nxt.value; dxLoad(nxt.value);
}
addEventListener("keydown",e=>{
  if(!document.getElementById("decider").classList.contains("open")) return;
  if(e.key==="Escape") closeDecider();
  if(e.key==="ArrowLeft") dxDecide("trash");
  if(e.key==="ArrowRight") dxDecide("keep");
  if(e.key==="ArrowDown") dxUndo();
});

/* ---------------- sort mode ---------------- */
function renderMode(mode){
  document.querySelectorAll("#modeSeg button").forEach(b=>{
    b.classList.toggle("on", b.dataset.mode===mode);
  });
  document.getElementById("foot").dataset.mode = mode;
}
async function setMode(mode){
  await api("/api/mode",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({mode})});
  renderMode(mode);
  flashFoot(mode==="ask" ? "New downloads will wait for your decision" : "New downloads will be auto-sorted");
  refresh();
}

/* ---------------- pending decisions ---------------- */
function fmtSize(b){
  if(b<1024) return b+" B";
  const u=["KB","MB","GB","TB"]; let i=-1;
  do{ b/=1024; i++; }while(b>=1024 && i<u.length-1);
  return b.toFixed(b<10?1:0)+" "+u[i];
}
function renderPending(list){
  const card=document.getElementById("pendingCard");
  if(!list.length){ card.style.display="none"; return; }
  card.style.display="";
  document.getElementById("pendCount").textContent = list.length;
  document.getElementById("pending").innerHTML = list.map(p=>`
    <div class="prow">
      <div class="ico">${ic(p.cat)}</div>
      <div class="meta">
        <div class="name">${esc(p.name)}</div>
        <div class="sub">suggested → <span class="sug">${esc(p.cat)}/</span> · ${fmtSize(p.size)}</div>
      </div>
      <div class="acts">
        <button class="pbtn sort" onclick='sortOne(${JSON.stringify(p.path)},${JSON.stringify(p.cat)})'>Sort</button>
        <button class="pbtn" onclick='keepOne(${JSON.stringify(p.path)})'>Keep</button>
      </div>
    </div>`).join("");
}
async function sortOne(path, cat){
  await api("/api/pending/sort",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path,cat})});
  flashFoot(`Sorted to ${cat}/`); refresh();
}
async function keepOne(path){
  await api("/api/pending/keep",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({path})});
  flashFoot("Kept in Downloads"); refresh();
}
async function sortAll(){
  const r = await api("/api/pending/sortall",{method:"POST"});
  flashFoot(r.moved ? `Sorted ${r.moved} file${r.moved>1?"s":""}` : "Nothing to sort"); refresh();
}

/* ---------------- search ---------------- */
let searchT;
function onSearch(q){
  clearTimeout(searchT);
  const box=document.getElementById("searchResults");
  if(!q || !q.trim()){ box.classList.remove("open"); box.innerHTML=""; return; }
  searchT=setTimeout(()=>doSearch(q.trim()), 220);
}
async function doSearch(q){
  const box=document.getElementById("searchResults");
  let res=[];
  try{ res = await api("/api/search?q="+encodeURIComponent(q)); }catch(e){}
  if(!res.length){
    box.innerHTML='<div class="sr-empty">No matches in Downloads</div>';
  }else{
    box.innerHTML = res.slice(0,200).map(r=>`
      <div class="sr" onclick='reveal(${JSON.stringify(r.path)})' title="Reveal in file manager">
        <div class="ico">${ic((r.folder||"").split("/")[0])}</div>
        <div class="meta">
          <div class="name">${esc(r.name)}</div>
          <div class="sub">${r.folder ? esc(r.folder)+"/" : "top level"}</div>
        </div>
        <div class="s">${fmtSize(r.size)}</div>
      </div>`).join("") + (res.length>200?`<div class="sr-empty">+${res.length-200} more — narrow your search</div>`:"");
  }
  box.classList.add("open");
}
document.addEventListener("click", e=>{
  if(!e.target.closest(".search")) document.getElementById("searchResults").classList.remove("open");
});

/* ---------------- update check ---------------- */
async function checkUpdate(force){
  try{
    const u = await api("/api/update/check" + (force ? "?force=1" : ""));
    const bar = document.getElementById("updateBar");
    if(u && u.available){
      document.getElementById("updateText").textContent =
        `Update available — ${u.latest}  (you have ${u.current})`;
      bar.style.display = "flex";
    }else{
      bar.style.display = "none";
    }
    return u;
  }catch(e){ return null; }
}
async function checkNow(){
  flashFoot("Checking for updates…");
  const u = await checkUpdate(true);
  if(!u){ flashFoot("Update check failed"); return; }
  if(u.error){ flashFoot("Update check failed: " + u.error); return; }
  if(u.available) flashFoot(`Update available — ${u.latest}`);
  else flashFoot(`You're on the latest (${u.current})`);
}
async function getUpdate(){
  flashFoot("Opening download…");
  await api("/api/update/open",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({asset:true})});
}
checkUpdate(); setInterval(checkUpdate, 30*60*1000);

refresh(); setInterval(refresh, 2000);
</script>
